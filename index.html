<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>💰 Revenue Tracker - Financial Management</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        header { text-align: center; color: white; margin-bottom: 40px; }
        header h1 { font-size: 2.5em; margin-bottom: 10px; text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3); }
        header p { font-size: 1.1em; opacity: 0.9; }
        
        .stats { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-bottom: 30px; }
        .stat-box { background: white; padding: 30px; border-radius: 10px; text-align: center; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); }
        .stat-box h3 { color: #666; font-size: 0.9em; text-transform: uppercase; margin-bottom: 10px; }
        .stat-box .value { font-size: 2em; font-weight: bold; color: #667eea; }
        
        .main-content { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-bottom: 30px; }
        .card { background: white; border-radius: 10px; padding: 30px; box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2); }
        .card h2 { color: #667eea; margin-bottom: 20px; font-size: 1.8em; }
        
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 8px; color: #333; font-weight: 600; }
        input, select, textarea { width: 100%; padding: 12px; border: 2px solid #e0e0e0; border-radius: 5px; font-size: 1em; }
        input:focus, select:focus, textarea:focus { outline: none; border-color: #667eea; }
        
        button { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); color: white; padding: 12px 30px; border: none; border-radius: 5px; font-size: 1em; font-weight: 600; cursor: pointer; width: 100%; margin-top: 10px; transition: transform 0.2s ease; }
        button:hover { transform: scale(1.02); }
        
        .delete-btn { background: #e74c3c; width: auto; padding: 8px 15px; margin: 0; }
        .delete-btn:hover { background: #c0392b; }
        
        .revenue-list { max-height: 500px; overflow-y: auto; }
        .revenue-item { background: #f9f9f9; padding: 15px; margin-bottom: 10px; border-left: 4px solid #667eea; border-radius: 5px; display: flex; justify-content: space-between; align-items: center; }
        .revenue-item-info { flex: 1; }
        .revenue-item-date { color: #999; font-size: 0.9em; margin-top: 5px; }
        .revenue-item-amount { font-weight: bold; font-size: 1.2em; color: #27ae60; margin-right: 20px; }
        
        .empty-state { text-align: center; color: #999; padding: 30px; }
        .error { background: #ffe0e0; color: #c0392b; padding: 12px; border-radius: 5px; margin-bottom: 15px; display: none; }
        .success { background: #e0ffe0; color: #27ae60; padding: 12px; border-radius: 5px; margin-bottom: 15px; display: none; }
        
        @media (max-width: 768px) { .main-content { grid-template-columns: 1fr; } .stats { grid-template-columns: 1fr; } }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Revenue Tracker</h1>
            <p>Manage and track your revenue with ease</p>
        </header>

        <div class="stats">
            <div class="stat-box">
                <h3>Total Revenue</h3>
                <div class="value" id="totalRevenue">$0.00</div>
            </div>
            <div class="stat-box">
                <h3>Number of Entries</h3>
                <div class="value" id="totalEntries">0</div>
            </div>
            <div class="stat-box">
                <h3>Average Revenue</h3>
                <div class="value" id="averageRevenue">$0.00</div>
            </div>
        </div>

        <div class="main-content">
            <div class="card">
                <h2>Add Revenue Entry</h2>
                <div id="errorMsg" class="error"></div>
                <div id="successMsg" class="success"></div>
                <form id="revenueForm">
                    <div class="form-group">
                        <label for="description">Description</label>
                        <input type="text" id="description" placeholder="e.g., Product Sale" required>
                    </div>
                    <div class="form-group">
                        <label for="amount">Amount ($)</label>
                        <input type="number" id="amount" placeholder="0.00" step="0.01" min="0" required>
                    </div>
                    <div class="form-group">
                        <label for="date">Date</label>
                        <input type="date" id="date" required>
                    </div>
                    <div class="form-group">
                        <label for="category">Category</label>
                        <select id="category" required>
                            <option value="">Select a category</option>
                            <option value="Sales">Sales</option>
                            <option value="Services">Services</option>
                            <option value="Investments">Investments</option>
                            <option value="Other">Other</option>
                        </select>
                    </div>
                    <button type="submit">Add Entry</button>
                    <button type="button" onclick="exportToCSV()" style="background: #3498db; margin-top: 5px;">Export to CSV</button>
                </form>
            </div>

            <div class="card">
                <h2>Recent Entries</h2>
                <div id="revenueList" class="revenue-list">
                    <div class="empty-state">No entries yet. Add your first entry!</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let revenues = JSON.parse(localStorage.getItem('revenues')) || [];
        document.getElementById('date').valueAsDate = new Date();
        document.getElementById('revenueForm').addEventListener('submit', addRevenue);

        function addRevenue(e) {
            e.preventDefault();
            const description = document.getElementById('description').value.trim();
            const amount = parseFloat(document.getElementById('amount').value);
            const date = document.getElementById('date').value;
            const category = document.getElementById('category').value;

            if (!description || !amount || !date || !category) {
                showError('Please fill in all fields');
                return;
            }
            if (amount <= 0) {
                showError('Amount must be greater than 0');
                return;
            }

            revenues.push({
                id: Date.now(),
                description,
                amount,
                date,
                category,
                createdAt: new Date().toISOString()
            });

            saveToLocalStorage();
            updateUI();
            showSuccess('Revenue entry added successfully!');
            document.getElementById('revenueForm').reset();
            document.getElementById('date').valueAsDate = new Date();
        }

        function deleteRevenue(id) {
            if (confirm('Delete this entry?')) {
                revenues = revenues.filter(r => r.id !== id);
                saveToLocalStorage();
                updateUI();
                showSuccess('Entry deleted!');
            }
        }

        function saveToLocalStorage() {
            localStorage.setItem('revenues', JSON.stringify(revenues));
        }

        function updateUI() {
            updateStats();
            displayRevenues();
        }

        function updateStats() {
            const total = revenues.reduce((sum, r) => sum + r.amount, 0);
            const average = revenues.length > 0 ? total / revenues.length : 0;
            document.getElementById('totalRevenue').textContent = formatCurrency(total);
            document.getElementById('totalEntries').textContent = revenues.length;
            document.getElementById('averageRevenue').textContent = formatCurrency(average);
        }

        function displayRevenues() {
            const list = document.getElementById('revenueList');
            if (revenues.length === 0) {
                list.innerHTML = '<div class="empty-state">No entries yet. Add your first entry!</div>';
                return;
            }
            const sorted = [...revenues].sort((a, b) => new Date(b.date) - new Date(a.date));
            list.innerHTML = sorted.map(r => `
                <div class="revenue-item">
                    <div class="revenue-item-info">
                        <strong>${r.description}</strong>
                        <div class="revenue-item-date">${formatDate(r.date)} • ${r.category}</div>
                    </div>
                    <div class="revenue-item-amount">${formatCurrency(r.amount)}</div>
                    <button class="delete-btn" onclick="deleteRevenue(${r.id})">Delete</button>
                </div>
            `).join('');
        }

        function formatCurrency(amount) {
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount);
        }

        function formatDate(dateString) {
            const options = { year: 'numeric', month: 'short', day: 'numeric' };
            return new Date(dateString + 'T00:00:00').toLocaleDateString('en-US', options);
        }

        function showError(message) {
            const errorDiv = document.getElementById('errorMsg');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => { errorDiv.style.display = 'none'; }, 3000);
        }

        function showSuccess(message) {
            const successDiv = document.getElementById('successMsg');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => { successDiv.style.display = 'none'; }, 3000);
        }

        function exportToCSV() {
            if (revenues.length === 0) {
                showError('No data to export');
                return;
            }
            const headers = ['Description', 'Amount', 'Date', 'Category'];
            const csvContent = [
                headers.join(','),
                ...revenues.map(r => `"${r.description}",${r.amount},"${r.date}","${r.category}"`)
            ].join('\n');
            const blob = new Blob([csvContent], { type: 'text/csv' });
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `revenue-tracker-${new Date().toISOString().split('T')[0]}.csv`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            window.URL.revokeObjectURL(url);
            showSuccess('Data exported successfully!');
        }

        updateUI();
    </script>
</body>
</html>
