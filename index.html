<!DOCTYPE html>

<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوحة الإيرادات</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Arabic:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --purple:#7c3aed;--purple-light:#a78bfa;--green:#34d399;--blue:#38bdf8;
  --pink:#f472b6;--orange:#fb923c;--red:#f87171;
  --glass:rgba(255,255,255,0.08);--glass-border:rgba(255,255,255,0.12);
  --text:rgba(255,255,255,0.85);--text-muted:rgba(255,255,255,0.45);
}
body{font-family:'IBM Plex Sans Arabic',sans-serif;color:#fff;min-height:100vh;overflow-x:hidden}
#bg{position:fixed;inset:0;z-index:0}
.orb{position:absolute;border-radius:50%;filter:blur(70px);animation:floatOrb var(--dur,10s) ease-in-out infinite;pointer-events:none}
@keyframes floatOrb{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(var(--tx,30px),var(--ty,-40px)) scale(var(--sc,1.1))}}
.star{position:absolute;border-radius:50%;background:#fff;animation:twinkle var(--dur,3s) ease-in-out infinite}
@keyframes twinkle{0%,100%{opacity:var(--op1,.7);transform:scale(1)}50%{opacity:var(--op2,.2);transform:scale(.5)}}
.ring{position:absolute;border-radius:50%;animation:spinRing var(--dur,20s) linear infinite;pointer-events:none}
@keyframes spinRing{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.ring-rev{animation-direction:reverse}
.grid-bg{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,.03) 1px,transparent 1px);background-size:50px 50px}
#app{display:flex;min-height:100vh;position:relative;z-index:1}
#sidebar{position:fixed;right:0;top:0;bottom:0;width:240px;background:rgba(8,6,24,.65);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-left:1px solid var(--glass-border);display:flex;flex-direction:column;z-index:200}
.sidebar-logo{padding:22px 18px;border-bottom:1px solid var(--glass-border);display:flex;align-items:center;gap:12px}
.logo-icon{width:42px;height:42px;border-radius:12px;background:linear-gradient(135deg,var(--purple),var(--purple-light));display:flex;align-items:center;justify-content:center;font-size:20px;box-shadow:0 4px 16px rgba(124,58,237,.5);flex-shrink:0}
nav{flex:1;padding:14px 10px;display:flex;flex-direction:column;gap:3px;overflow-y:auto}
.nav-item{display:flex;align-items:center;gap:11px;padding:10px 13px;border-radius:10px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:13.5px;font-family:inherit;width:100%;text-align:right;transition:all .2s;border-right:3px solid transparent}
.nav-item:hover{background:rgba(255,255,255,.05);color:#fff}
.nav-item.active{background:rgba(124,58,237,.2);color:var(--purple-light);border-right-color:var(--purple-light);font-weight:600}
.sidebar-user{padding:14px 10px;border-top:1px solid var(--glass-border)}
.user-card{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;background:rgba(255,255,255,.05);cursor:pointer;transition:background .2s;border:none;width:100%;font-family:inherit;color:#fff}
.user-card:hover{background:rgba(255,255,255,.09)}
.avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--purple-light));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.logout-btn{display:flex;align-items:center;gap:8px;padding:8px 12px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:13px;font-family:inherit;width:100%;border-radius:8px;margin-top:4px;transition:color .2s}
.logout-btn:hover{color:var(--red)}
#main{margin-right:240px;flex:1;padding:26px;min-height:100vh}
.topbar{display:flex;justify-content:space-between;align-items:center;margin-bottom:26px}
.page-title{font-size:21px;font-weight:700;margin-bottom:3px}
.page-date{font-size:12px;color:var(--text-muted)}
.topbar-actions{display:flex;gap:10px;align-items:center}
.topbar-btn{padding:9px 14px;border-radius:10px;border:1px solid var(--glass-border);background:var(--glass);backdrop-filter:blur(12px);cursor:pointer;font-size:14px;transition:all .2s;color:#fff}
.topbar-btn:hover{background:rgba(255,255,255,.14)}
.topbar-avatar{width:38px;height:38px;border-radius:50%;background:linear-gradient(135deg,var(--purple),var(--purple-light));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;cursor:pointer;flex-shrink:0}
.card{background:rgba(255,255,255,.07);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border:1px solid var(--glass-border);border-radius:16px;padding:22px}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:16px}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:16px}
.grid-2-1{display:grid;grid-template-columns:2fr 1fr;gap:16px}
.gap-20{display:flex;flex-direction:column;gap:20px}
.kpi-card{position:relative;overflow:hidden}
.kpi-label{font-size:12px;color:var(--text-muted);margin-bottom:7px}
.kpi-value{font-size:22px;font-weight:800;margin-bottom:5px;letter-spacing:-.5px}
.kpi-change{font-size:12px}
.kpi-change.up{color:var(--green)}.kpi-change.down{color:var(--red)}
.kpi-top{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px}
.kpi-icon{font-size:26px}
table{width:100%;border-collapse:collapse}
th{text-align:right;padding:10px 12px;font-size:12px;color:var(--text-muted);font-weight:600;border-bottom:1px solid rgba(255,255,255,.08)}
td{padding:13px 12px;font-size:13px;border-bottom:1px solid rgba(255,255,255,.04)}
tr:last-child td{border-bottom:none}
tr:hover td{background:rgba(255,255,255,.03)}
.badge{display:inline-block;padding:3px 10px;border-radius:6px;font-size:12px}
.badge-green{background:rgba(52,211,153,.15);color:var(--green)}
.badge-orange{background:rgba(251,146,60,.15);color:var(--orange)}
.badge-red{background:rgba(248,113,113,.15);color:var(--red)}
.progress-wrap{height:6px;background:rgba(255,255,255,.08);border-radius:3px;overflow:hidden;margin-top:6px}
.progress-fill{height:100%;border-radius:3px;transition:width 1.2s cubic-bezier(.4,0,.2,1)}
.settings-layout{display:grid;grid-template-columns:200px 1fr;gap:20px;align-items:start}
.stab{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:9px;border:none;background:transparent;color:var(--text-muted);cursor:pointer;font-size:13.5px;font-family:inherit;width:100%;text-align:right;transition:all .2s}
.stab:hover{background:rgba(255,255,255,.05);color:#fff}
.stab.active{background:rgba(124,58,237,.22);color:var(--purple-light);font-weight:600}
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;color:var(--text-muted);margin-bottom:7px;font-weight:500}
.field input,.field textarea,.field select{width:100%;background:rgba(255,255,255,.07);border:1px solid rgba(255,255,255,.14);border-radius:9px;padding:10px 14px;color:#fff;font-size:14px;font-family:inherit;outline:none;transition:border-color .2s,box-shadow .2s}
.field input:focus,.field textarea:focus,.field select:focus{border-color:var(--purple);box-shadow:0 0 0 3px rgba(124,58,237,.2)}
.field textarea{resize:vertical}
.field select option{background:#1a1230}
.fields-2{display:grid;grid-template-columns:1fr 1fr;gap:14px}
.toggle-row{display:flex;justify-content:space-between;align-items:center;padding:15px 18px;background:rgba(255,255,255,.05);border-radius:11px;margin-bottom:10px}
.toggle-title{font-size:14px;font-weight:500;margin-bottom:3px}
.toggle-desc{font-size:12px;color:var(--text-muted)}
.toggle{width:48px;height:26px;border-radius:13px;background:rgba(255,255,255,.18);cursor:pointer;position:relative;transition:background .3s;flex-shrink:0}
.toggle.on{background:var(--purple)}
.toggle-knob{position:absolute;top:3px;left:3px;width:20px;height:20px;border-radius:50%;background:#fff;transition:left .3s;box-shadow:0 1px 4px rgba(0,0,0,.4)}
.toggle.on .toggle-knob{left:25px}
.btn-primary{background:linear-gradient(135deg,var(--purple),var(--purple-light));border:none;border-radius:10px;padding:12px 28px;color:#fff;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;transition:transform .2s,box-shadow .2s;box-shadow:0 4px 20px rgba(124,58,237,.4)}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(124,58,237,.5)}
.btn-ghost{background:rgba(124,58,237,.2);border:1px solid rgba(124,58,237,.35);border-radius:8px;padding:6px 14px;color:var(--purple-light);cursor:pointer;font-size:13px;font-family:inherit;transition:all .2s}
.btn-ghost:hover{background:rgba(124,58,237,.35)}
#toast{position:fixed;top:24px;left:50%;transform:translateX(-50%) translateY(-80px);z-index:9999;background:rgba(5,150,105,.92);backdrop-filter:blur(12px);border-radius:12px;padding:12px 24px;font-size:14px;font-weight:600;box-shadow:0 8px 32px rgba(5,150,105,.4);transition:transform .4s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;pointer-events:none}
#toast.show{transform:translateX(-50%) translateY(0)}
#login-screen{position:fixed;inset:0;z-index:500;display:flex;align-items:center;justify-content:center}
.login-card{width:430px;padding:46px 40px;background:rgba(255,255,255,.09);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);border:1px solid rgba(255,255,255,.16);border-radius:20px;box-shadow:0 20px 80px rgba(0,0,0,.5)}
.login-logo{text-align:center;margin-bottom:34px}
.login-logo-icon{width:68px;height:68px;border-radius:20px;background:linear-gradient(135deg,var(--purple),var(--purple-light));display:inline-flex;align-items:center;justify-content:center;font-size:30px;box-shadow:0 8px 32px rgba(124,58,237,.6);margin-bottom:14px}
.login-title{font-size:24px;font-weight:800;margin-bottom:5px}
.login-sub{font-size:13px;color:var(--text-muted)}
.login-error{background:rgba(239,68,68,.18);border:1px solid rgba(239,68,68,.4);border-radius:10px;padding:11px 16px;color:#fca5a5;font-size:13px;margin-bottom:18px;text-align:center;display:none}
.login-footer{text-align:center;margin-top:22px;font-size:12px;color:var(--text-muted)}
.link{color:var(--purple-light);cursor:pointer}
.remember-row{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px}
.checkbox-label{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--text-muted);cursor:pointer}
input[type=checkbox]{accent-color:var(--purple);width:15px;height:15px}
input::placeholder,textarea::placeholder{color:rgba(255,255,255,.28)!important}
.bg-picker{display:grid;grid-template-columns:repeat(3,1fr);gap:14px}
.bg-card{border-radius:14px;overflow:hidden;cursor:pointer;border:2px solid rgba(255,255,255,.1);transition:all .3s}
.bg-card.selected{border-color:var(--purple-light);box-shadow:0 0 24px rgba(124,58,237,.5);transform:scale(1.03)}
.bg-preview{height:110px;position:relative;overflow:hidden}
.bg-card-label{padding:10px 13px;background:rgba(0,0,0,.35)}
.bg-card-name{font-size:13px;font-weight:600;margin-bottom:2px}
.bg-card-desc{font-size:11px;color:var(--text-muted)}
.bg-check{position:absolute;inset:0;display:flex;align-items:center;justify-content:center}
.bg-check-icon{width:34px;height:34px;background:var(--purple);border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:16px}
.plan-card{background:linear-gradient(135deg,rgba(124,58,237,.2),rgba(167,139,250,.1));border:1px solid rgba(124,58,237,.3);border-radius:14px;padding:22px;margin-bottom:22px;display:flex;justify-content:space-between;align-items:center}
.stat-row{display:flex;justify-content:space-between;padding:13px 0;border-bottom:1px solid rgba(255,255,255,.06)}
.stat-row:last-child{border-bottom:none}
@keyframes fadeUp{from{opacity:0;transform:translateY(18px)}to{opacity:1;transform:translateY(0)}}
.page-content{animation:fadeUp .3s ease forwards}
@keyframes pulse{0%,100%{opacity:.4;transform:translate(-50%,-50%) scale(1)}50%{opacity:.9;transform:translate(-50%,-50%) scale(1.2)}}
::-webkit-scrollbar{width:5px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(124,58,237,.35);border-radius:3px}
</style>
</head>
<body>

<div id="bg"></div>
<div id="toast"></div>

<!-- LOGIN -->

<div id="login-screen">
  <div class="login-card">
    <div class="login-logo">
      <div class="login-logo-icon">📊</div>
      <div class="login-title">لوحة الإيرادات</div>
      <div class="login-sub">سجّل دخولك للمتابعة</div>
    </div>
    <div class="login-error" id="login-error"></div>
    <div class="field">
      <label>البريد الإلكتروني</label>
      <input type="email" id="login-email" placeholder="example@company.com" style="direction:ltr;text-align:right">
    </div>
    <div class="field">
      <label>كلمة المرور</label>
      <input type="password" id="login-pass" placeholder="••••••••" style="direction:ltr;text-align:right">
    </div>
    <div class="remember-row">
      <label class="checkbox-label"><input type="checkbox" id="remember"> تذكرني</label>
      <span class="link" style="font-size:13px">نسيت كلمة المرور؟</span>
    </div>
    <button class="btn-primary" style="width:100%;font-size:15px;padding:14px" onclick="doLogin()">تسجيل الدخول</button>
    <div class="login-footer">ليس لديك حساب؟ <span class="link">تواصل مع المسؤول</span></div>
  </div>
</div>

<!-- MAIN APP -->

<div id="app" style="display:none">
  <div id="sidebar">
    <div class="sidebar-logo">
      <div class="logo-icon">📊</div>
      <div>
        <div style="font-size:14px;font-weight:700">لوحة الإيرادات</div>
        <div style="font-size:11px;color:var(--text-muted)">إصدار 2.0</div>
      </div>
    </div>
    <nav id="nav">
      <button class="nav-item active" data-page="dashboard"><span style="font-size:16px;width:20px;text-align:center">⊞</span> لوحة التحكم</button>
      <button class="nav-item" data-page="revenue"><span style="font-size:16px;width:20px;text-align:center">📈</span> الإيرادات</button>
      <button class="nav-item" data-page="transactions"><span style="font-size:16px;width:20px;text-align:center">💳</span> المعاملات</button>
      <button class="nav-item" data-page="products"><span style="font-size:16px;width:20px;text-align:center">📦</span> المنتجات</button>
      <button class="nav-item" data-page="reports"><span style="font-size:16px;width:20px;text-align:center">📊</span> التقارير</button>
      <button class="nav-item" data-page="settings"><span style="font-size:16px;width:20px;text-align:center">⚙️</span> الإعدادات</button>
    </nav>
    <div class="sidebar-user">
      <button class="user-card" onclick="goSettings('profile')">
        <div class="avatar" id="sb-avatar">أح</div>
        <div style="flex:1;text-align:right">
          <div style="font-size:13px;font-weight:600" id="sb-name">أحمد محمد</div>
          <div style="font-size:11px;color:var(--text-muted)" id="sb-role">مدير المالية</div>
        </div>
        <span style="color:var(--text-muted);font-size:12px">⚙️</span>
      </button>
      <button class="logout-btn" onclick="doLogout()"><span>🚪</span> تسجيل الخروج</button>
    </div>
  </div>

  <div id="main">
    <div class="topbar">
      <div>
        <div class="page-title" id="page-title">لوحة التحكم</div>
        <div class="page-date" id="page-date"></div>
      </div>
      <div class="topbar-actions">
        <button class="topbar-btn" onclick="toast('🔔 لا توجد إشعارات جديدة')">🔔</button>
        <button class="topbar-btn" onclick="toast('🔍 ميزة البحث قريباً')">🔍</button>
        <div class="topbar-avatar" id="top-avatar" onclick="goSettings('profile')" title="الإعدادات">أح</div>
      </div>
    </div>
    <div id="page-content" class="page-content"></div>
  </div>
</div>

<script>
// ── STATE ──────────────────────────────────────────────────────────────────
const S = {
  bg: 0, page: 'dashboard', stab: 'profile',
  profile: {
    name:'أحمد محمد', email:'ahmed@company.com', phone:'+966 50 123 4567',
    role:'مدير المالية', company:'شركة الأفق', bio:'مدير مالي محترف مع خبرة 10 سنوات في إدارة الإيرادات.',
    notifications:true, twoFactor:false, weeklyReports:true, securityAlerts:true, updates:false,
    language:'ar', currency:'SAR'
  }
};

// ── DATA ───────────────────────────────────────────────────────────────────
const monthly = [
  {m:'يناير',r:45000,e:28000,p:17000},{m:'فبراير',r:52000,e:31000,p:21000},
  {m:'مارس',r:48000,e:29000,p:19000},{m:'أبريل',r:61000,e:35000,p:26000},
  {m:'مايو',r:55000,e:32000,p:23000},{m:'يونيو',r:67000,e:38000,p:29000},
];
const prods = [
  {name:'المنتج الأول',sales:1240,rev:62000,growth:12.5,g:'#7c3aed,#a78bfa'},
  {name:'المنتج الثاني',sales:980,rev:49000,growth:8.3,g:'#059669,#34d399'},
  {name:'المنتج الثالث',sales:756,rev:37800,growth:-2.1,g:'#d97706,#fb923c'},
  {name:'المنتج الرابع',sales:654,rev:32700,growth:15.7,g:'#dc2626,#f87171'},
];
const txs = [
  {id:'#TRX-001',client:'شركة النور',amount:12500,status:'مكتمل',date:'2024-06-10'},
  {id:'#TRX-002',client:'مؤسسة الفجر',amount:8300,status:'معلق',date:'2024-06-09'},
  {id:'#TRX-003',client:'شركة الأمل',amount:15700,status:'مكتمل',date:'2024-06-08'},
  {id:'#TRX-004',client:'مجموعة الرياض',amount:6200,status:'ملغي',date:'2024-06-07'},
  {id:'#TRX-005',client:'شركة الخليج',amount:9800,status:'مكتمل',date:'2024-06-06'},
];

// ── BACKGROUNDS ────────────────────────────────────────────────────────────
const bgData = [
  {name:'موجات الضوء',desc:'تدرجات لونية متحركة',bg:'linear-gradient(135deg,#0f0c29,#302b63,#24243e)',prev:'linear-gradient(135deg,#0f0c29,#302b63,#24243e)'},
  {name:'سماء الليل',desc:'نجوم لامعة',bg:'linear-gradient(160deg,#080818,#160a28,#0a1520)',prev:'linear-gradient(160deg,#080818,#160a28,#0a1520)'},
  {name:'شبكة الكون',desc:'شبكة هندسية',bg:'#030712',prev:'#030712'},
];

function buildBg(idx) {
  const el = document.getElementById('bg');
  el.innerHTML = '';
  el.style.background = bgData[idx].bg;
  if(idx===0){
    const colors=['#a78bfa44','#818cf844','#38bdf844','#34d39944','#f472b644','#fb923c44'];
    const sz=[600,400,500,350,450,300],tops=['-10%','60%','30%','80%','-5%','40%'],lefts=['20%','70%','-5%','10%','60%','85%'];
    const txs2=['30px','-40px','50px','-20px','40px','-30px'],tys=['-40px','30px','20px','-50px','40px','20px'],durs=[8,10,12,9,11,7];
    colors.forEach((c,i)=>{
      const d=document.createElement('div');
      d.className='orb';
      d.style.cssText='background:radial-gradient(circle,'+c+' 0%,transparent 70%);width:'+sz[i]+'px;height:'+sz[i]+'px;top:'+tops[i]+';left:'+lefts[i]+';--dur:'+durs[i]+'s;--tx:'+txs2[i]+';--ty:'+tys[i]+';--sc:'+(1.04+i*.02);
      el.appendChild(d);
    });
  } else if(idx===1){
    const op1=[.7,.5,.8,.4,.6,.9,.5,.7],op2=[.2,1,.3,.9,.1,.4,.8,.2],durs=[2,3,2.5,4,3.5,2,4.5,3];
    const tops=[10,25,50,70,85,15,40,65],lefts=[15,45,80,20,60,90,35,75],szs=[2,3,2,4,2,3,2,3];
    for(let i=0;i<8;i++){
      const d=document.createElement('div');
      d.className='star';
      d.style.cssText='width:'+szs[i]+'px;height:'+szs[i]+'px;top:'+tops[i]+'%;left:'+lefts[i]+'%;--dur:'+durs[i]+'s;--op1:'+op1[i]+';--op2:'+op2[i];
      el.appendChild(d);
    }
    const glow=document.createElement('div');
    glow.style.cssText='position:absolute;bottom:-100px;left:50%;transform:translateX(-50%);width:700px;height:380px;background:linear-gradient(to top,rgba(124,58,237,.25),transparent);border-radius:50% 50% 0 0;filter:blur(50px)';
    el.appendChild(glow);
  } else {
    const gb=document.createElement('div');gb.className='grid-bg';el.appendChild(gb);

let toastTimer;

function doLogin(){
  const email=document.getElementById('login-email').value.trim();
  const pass=document.getElementById('login-pass').value;
  const err=document.getElementById('login-error');
  if(!email||!pass){err.textContent='يرجى إدخال البريد الإلكتروني وكلمة المرور';err.style.display='block';return;}
  if(pass.length<4){err.textContent='كلمة المرور يجب أن تكون 4 أحرف على الأقل';err.style.display='block';return;}
  err.style.display='none';
  document.getElementById('login-screen').style.display='none';
  document.getElementById('app').style.display='flex';
  syncUserUI();navigate('dashboard');
  toast('👋 أهلاً بك، '+S.profile.name);
}

  document.getElementById('app').style.display='none';
  document.getElementById('login-screen').style.display='flex';
  document.getElementById('login-email').value='';
  document.getElementById('login-pass').value='';
}

function fmt(n){return Number(n).toLocaleString('ar-SA');}
function miniSVG(data,color){
  const max=Math.max(...data),id='g'+color.replace('#','');
  const pts=data.map((v,i)=>(i/(data.length-1)*200)+','+(78-(v/max)*68)).join(' ');
  return '<svg width="100%" height="68" viewBox="0 0 200 80" preserveAspectRatio="none">'
    +'<defs><linearGradient id="'+id+'" x1="0" x2="0" y1="0" y2="1"><stop offset="0%" stop-color="'+color+'" stop-opacity=".3"/><stop offset="100%" stop-color="'+color+'" stop-opacity="0"/></linearGradient></defs>'
    +'<polygon points="0,80 '+pts+' 200,80" fill="url(#'+id+')" />'
    +'<polyline points="'+pts+'" fill="none" stroke="'+color+'" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>'
    +'</svg>';
}
function badge(s){
  const map={مكتمل:'green',معلق:'orange',ملغي:'red'};
  return '<span class="badge badge-'+(map[s]||'red')+'">'+s+'</span>';
}

+’<div style="position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:50px;height:50px;border-radius:50%;border:1px solid rgba(56,189,248,.3);animation:spinRing 5s linear infinite reverse"></div>’
];
panel.innerHTML=
‘<div class="gap-20">’
+’<div class="card">’
+’<div style="font-size:17px;font-weight:700;margin-bottom:6px">الخلفيات المتحركة الزجاجية ✨</div>’
+’<div style="font-size:13px;color:var(--text-muted);margin-bottom:22px">اختر خلفية التطبيق — تطبّق فوراً</div>’
+’<div class="bg-picker">’+bgData.map((b,i)=>
‘<div class="bg-card '+(S.bg===i?'selected':'')+'" onclick="changeBg('+i+')">’
+’<div class="bg-preview" style="background:'+b.prev+'">’+prevContents[i]+(S.bg===i?’<div class="bg-check"><div class="bg-check-icon">✓</div></div>’:’’)+’</div>’
+’<div class="bg-card-label"><div class="bg-card-name">’+b.name+’</div><div class="bg-card-desc">’+b.desc+’</div></div>’
+’</div>’
).join(’’)+’</div>’
+’</div>’
+’<div class="card">’
+’<div style="font-size:16px;font-weight:600;margin-bottom:18px">إعدادات أخرى</div>’
+’<div class="fields-2">’
+’<div class="field"><label>اللغة</label><select onchange="S.profile.language=this.value"><option value=“ar” ‘+(p.language===‘ar’?‘selected’:’’)+’>العربية</option><option value=“en” ‘+(p.language===‘en’?‘selected’:’’)+’>English</option></select></div>’
+’<div class="field"><label>العملة</label><select onchange="S.profile.currency=this.value"><option value=“SAR” ‘+(p.currency===‘SAR’?‘selected’:’’)+’>ريال سعودي</option><option value=“USD” ‘+(p.currency===‘USD’?‘selected’:’’)+’>دولار أمريكي</option><option value=“EUR” ‘+(p.currency===‘EUR’?‘selected’:’’)+’>يورو</option></select></div>’
+’</div>’
+’<button class="btn-primary" onclick="toast(\'✅ تم حفظ الإعدادات\')">حفظ</button>’
+’</div></div>’;
} else if(S.stab===‘billing’){
panel.innerHTML=
‘<div class="card">’
+’<div style="font-size:17px;font-weight:700;margin-bottom:22px">الفاتورة والاشتراك</div>’
+’<div class="plan-card"><div>’
+’<div style="font-size:12px;color:var(--purple-light);font-weight:600;margin-bottom:4px">الخطة الحالية</div>’
+’<div style="font-size:26px;font-weight:800">Pro ⭐</div>’
+’<div style="font-size:13px;color:var(--text-muted);margin-top:4px">يتجدد في 15 يوليو 2024</div>’
+’</div><div style="text-align:left"><div style="font-size:30px;font-weight:800">99 ر.س</div><div style="font-size:12px;color:var(--text-muted)">/ شهر</div></div></div>’
+’<div class="stat-row"><span style="color:var(--text-muted)">المعاملات المدفوعة هذا الشهر</span><span style="font-weight:600">27,500 ر.س</span></div>’
+’<div class="stat-row"><span style="color:var(--text-muted)">إجمالي المعاملات</span><span style="font-weight:600">124</span></div>’
+’<div class="stat-row"><span style="color:var(--text-muted)">تاريخ الاشتراك</span><span style="font-weight:600">1 يناير 2024</span></div>’
+’<div class="stat-row"><span style="color:var(--text-muted)">الدورة القادمة</span><span style="font-weight:600">15 يوليو 2024</span></div>’
+’<button class="btn-ghost" style="margin-top:18px;padding:10px 20px" onclick="toast(\'📩 تم إرسال الفاتورة إلى بريدك\')">تحميل الفاتورة</button>’
+’</div>’;
}
}

function togglePref(key,el){
S.profile[key]=!S.profile[key];
el.classList.toggle(‘on’,S.profile[key]);
toast(S.profile[key]?‘✅ تم التفعيل’:‘⚪ تم التعطيل’);
}

function saveProfile(){
const g=id=>{const e=document.getElementById(id);return e?e.value:null;};
if(g(‘f-name’))    S.profile.name=g(‘f-name’);
if(g(‘f-email’))   S.profile.email=g(‘f-email’);
if(g(‘f-phone’))   S.profile.phone=g(‘f-phone’);
if(g(‘f-role’))    S.profile.role=g(‘f-role’);
if(g(‘f-company’)) S.profile.company=g(‘f-company’);
if(g(‘f-bio’))     S.profile.bio=g(‘f-bio’);
syncUserUI();
toast(‘✅ تم حفظ التغييرات بنجاح’);
renderStab();
}

function changeBg(idx){
S.bg=idx;
buildBg(idx);
toast(‘✨ تم تطبيق خلفية “’+bgData[idx].name+’”’);
renderStab();
}

// ── INIT ───────────────────────────────────────────────────────────────────
buildBg(0);
document.getElementById(‘page-date’).textContent=new Date().toLocaleDateString(‘ar-SA’,{weekday:‘long’,year:‘numeric’,month:‘long’,day:‘numeric’});
</script>
